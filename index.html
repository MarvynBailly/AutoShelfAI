<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoShelfAI — pick a slide version</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root {
    --navy:   #0F2341;
    --navy-2: #1A3763;
    --accent: #2E86AB;
    --gold:   #C9A227;
    --ink:    #0E1A2B;
    --sub:    #516477;
    --line:   #E2E8EE;
    --bg:     #F7F9FC;
    --card:   #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }

  header {
    padding: 24px 32px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--card);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; color: var(--navy); }
  header p  { margin: 0; font-size: 14px; color: var(--sub); }
  header .hint { font-size: 12px; color: var(--sub); }
  header kbd {
    background: var(--bg);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 11px;
    color: var(--ink);
  }

  main {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px 32px 32px;
  }
  @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover { box-shadow: 0 8px 24px rgba(15,35,65,0.08); border-color: var(--accent); }

  .card-head {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .card-head .title { font-weight: 600; color: var(--navy); font-size: 15px; }
  .card-head .tag {
    font-size: 11px;
    font-weight: 600;
    background: var(--navy);
    color: #fff;
    padding: 3px 8px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }
  .card-head .tag.gold   { background: var(--gold); color: var(--ink); }
  .card-head .tag.accent { background: var(--accent); }

  .preview {
    position: relative;
    background: #000;
    aspect-ratio: 16 / 9;
    overflow: hidden;
  }
  .preview iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1600px;
    height: 900px;
    border: 0;
    transform-origin: top left;
    pointer-events: none;
  }
  .preview .cover {
    position: absolute; inset: 0;
    cursor: pointer;
    background: transparent;
  }
  .preview .reload {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(15,35,65,0.7);
    color: #fff;
    border: 0;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .card:hover .preview .reload { opacity: 1; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px 16px 16px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }
  .btn.primary:hover { background: var(--navy-2); border-color: var(--navy-2); color: #fff; }

  .filename {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: var(--sub);
    padding: 0 16px 12px;
    word-break: break-all;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>AutoShelfAI — pick a slide version</h1>
    <p>Live preview of each export. Click the preview to open in a new tab, or Present to go fullscreen.</p>
  </div>
  <div class="hint">Tip: press <kbd>1</kbd> / <kbd>2</kbd> / <kbd>3</kbd> to open versions in a new tab</div>
</header>
<main id="cards"></main>

<script>
  const versions = [
    {
      key: '1',
      title: 'Hybrid (auto)',
      tag: 'default',
      tagClass: '',
      file: 'merge_v3_full_hybrid.html',
      note: 'Responsive width, adapts to window'
    },
    {
      key: '2',
      title: '16:9',
      tag: 'widescreen',
      tagClass: 'accent',
      file: 'merge_v3_full_hybrid_16x9.html',
      note: 'Fixed 1920×1080 — projectors, modern laptops'
    },
    {
      key: '3',
      title: '4:3',
      tag: 'classic',
      tagClass: 'gold',
      file: 'merge_v3_full_hybrid_4x3.html',
      note: 'Fixed 1024×768 — older projectors, room monitors'
    }
  ];

  const main = document.getElementById('cards');

  versions.forEach((v, i) => {
    const card = document.createElement('section');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="title">${v.title}</div>
        </div>
        <span class="tag ${v.tagClass}">${v.tag}</span>
      </div>
      <div class="preview" data-file="${v.file}">
        <iframe src="${v.file}" loading="lazy" scrolling="no" title="${v.title} preview"></iframe>
        <button class="reload" title="Reload preview">reload</button>
        <a class="cover" href="${v.file}" target="_blank" rel="noopener" title="Open ${v.file} in new tab"></a>
      </div>
      <div class="actions">
        <a class="btn" href="${v.file}" target="_blank" rel="noopener">Open in tab</a>
        <a class="btn primary" href="${v.file}?present=1" target="_blank" rel="noopener">Present ▶</a>
      </div>
      <div class="filename">${v.file} — ${v.note}</div>
    `;
    main.appendChild(card);
  });

  // Scale each iframe to fit its preview pane
  function scaleIframes() {
    document.querySelectorAll('.preview').forEach(p => {
      const iframe = p.querySelector('iframe');
      if (!iframe) return;
      const w = p.clientWidth;
      const scale = w / 1600;
      iframe.style.transform = `scale(${scale})`;
      iframe.style.width = '1600px';
      iframe.style.height = `${900 / scale * scale}px`;
      // keep iframe sized so the scaled content fills the 16:9 box
      iframe.style.height = '900px';
    });
  }
  window.addEventListener('resize', scaleIframes);
  window.addEventListener('load', scaleIframes);
  scaleIframes();

  // Reload buttons
  document.querySelectorAll('.preview .reload').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      const iframe = btn.parentElement.querySelector('iframe');
      iframe.src = iframe.src;
    });
  });

  // Keyboard shortcuts 1/2/3
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const v = versions.find(v => v.key === e.key);
    if (v) window.open(v.file, '_blank', 'noopener');
  });
</script>
</body>
</html>
